name: 台灣交通輿情大數據天天自動爬蟲機制

on:
  schedule:
    # 每天台灣時間凌晨 00:00 自動執行
    - cron: '0 16 * * *'
  workflow_dispatch: # 允許網頁手動點擊執行

# 🌟 新增：設定全域環境變數，提早強制啟用 Node.js 24 頂級引擎
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_crawl:
    runs-on: ubuntu-latest

    steps:
    # 🌟 升級：全面採用相容 Node.js 24 的官方最新版套件
    - name: 1. 載入最新的專案程式碼
      uses: actions/checkout@v4

    - name: 2. 在雲端電腦上安裝 Python 3.10 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 一鍵安裝爬蟲與 GPS 換算所需的所有工具包
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 geopy

    - name: 4. 點火！強制執行我們的爬蟲程式
      run: python news_spider.py

    - name: 5. 自動將洗好的全新 clean_data.json 塞回倉庫存檔並發布網站
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Cloud Robot"
        git add clean_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 雲端機器人自動化：已同步全台最新重大交通輿情數據" && git push)
